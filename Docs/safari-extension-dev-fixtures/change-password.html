<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitwarden Safari Dev Fixture — Change Password</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
        color: #0f172a;
      }
      main {
        max-width: 30rem;
        margin: 2rem auto;
        padding: 1.5rem;
      }
      .card {
        background: rgba(255, 255, 255, 0.94);
        border-radius: 24px;
        padding: 1.5rem;
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        font-weight: 700;
        color: #1d4ed8;
        background: #dbeafe;
        border-radius: 999px;
        padding: 0.35rem 0.7rem;
      }
      h1 {
        margin: 0.9rem 0 0.75rem;
        font-size: 1.85rem;
      }
      p {
        line-height: 1.55;
      }
      form {
        display: grid;
        gap: 1rem;
        margin-top: 1.35rem;
      }
      label {
        display: grid;
        gap: 0.4rem;
        font-weight: 600;
      }
      input {
        font: inherit;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 0.8rem 0.9rem;
        background: white;
      }
      button {
        font: inherit;
        border: 0;
        border-radius: 14px;
        padding: 0.95rem 1rem;
        background: #2563eb;
        color: white;
        font-weight: 700;
      }
      .note {
        margin-top: 1rem;
        padding: 0.95rem 1rem;
        border-radius: 14px;
        background: #dbeafe;
        color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <div class="eyebrow">Generated password follow-up</div>
        <h1>Update your password</h1>
        <p>
          Use this page to exercise change-password detection and generated-password → update-password follow-up.
        </p>

        <form id="security-form" name="changePassword" action="/account/change-password" method="post" autocomplete="on">
          <label for="current-password">Current password
            <input
              id="current-password"
              name="currentPassword"
              type="password"
              autocomplete="current-password"
              placeholder="Current password"
            />
          </label>

          <label for="new-password">New password
            <input
              id="new-password"
              name="newPassword"
              type="password"
              autocomplete="new-password"
              placeholder="New password"
            />
          </label>

          <label for="confirm-new-password">Confirm new password
            <input
              id="confirm-new-password"
              name="confirmNewPassword"
              type="password"
              autocomplete="new-password"
              placeholder="Confirm new password"
            />
          </label>

          <button id="update-password" type="submit">Update password</button>
        </form>

        <div id="fixture-result" class="note" hidden aria-live="polite"></div>

        <div class="note">
          Expected native interpretation: current + new/confirm password surface that should map to update-password.
        </div>
      </section>
    </main>
    <script>
      const changePasswordForm = document.getElementById('security-form');
      const changePasswordResult = document.getElementById('fixture-result');
      changePasswordForm?.addEventListener('submit', (event) => {
        event.preventDefault();
        const currentPasswordLength = document.getElementById('current-password')?.value?.length || 0;
        const newPasswordLength = document.getElementById('new-password')?.value?.length || 0;
        const confirmPasswordLength = document.getElementById('confirm-new-password')?.value?.length || 0;
        changePasswordResult.hidden = false;
        changePasswordResult.textContent = `Change-password fixture intercepted submit locally. Password lengths: ${currentPasswordLength}/${newPasswordLength}/${confirmPasswordLength}.`;
      });
    </script>
  </body>
</html>
