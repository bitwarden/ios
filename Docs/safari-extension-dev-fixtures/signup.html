<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitwarden Safari Dev Fixture — Signup</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        background: linear-gradient(180deg, #fdf2f8 0%, #f8fafc 100%);
        color: #111827;
      }
      main {
        max-width: 30rem;
        margin: 2rem auto;
        padding: 1.5rem;
      }
      .card {
        background: rgba(255, 255, 255, 0.94);
        border-radius: 24px;
        padding: 1.5rem;
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        font-weight: 700;
        color: #9d174d;
        background: #fce7f3;
        border-radius: 999px;
        padding: 0.35rem 0.7rem;
      }
      h1 {
        margin: 0.9rem 0 0.75rem;
        font-size: 1.85rem;
      }
      p {
        line-height: 1.55;
      }
      form {
        display: grid;
        gap: 1rem;
        margin-top: 1.35rem;
      }
      label {
        display: grid;
        gap: 0.4rem;
        font-weight: 600;
      }
      input {
        font: inherit;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 0.8rem 0.9rem;
        background: white;
      }
      button {
        font: inherit;
        border: 0;
        border-radius: 14px;
        padding: 0.95rem 1rem;
        background: #be185d;
        color: white;
        font-weight: 700;
      }
      .note {
        margin-top: 1rem;
        padding: 0.95rem 1rem;
        border-radius: 14px;
        background: #fce7f3;
        color: #9d174d;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <div class="eyebrow">Generated password flow</div>
        <h1>Create your Bitwarden Safari test account</h1>
        <p>
          Use this page to exercise signup classification and generated-password → save-new-login follow-up.
        </p>

        <form id="create-account-form" name="register" action="/register" method="post" autocomplete="on">
          <label for="email">Email
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="username"
              placeholder="user@example.com"
            />
          </label>

          <label for="new-password">New password
            <input
              id="new-password"
              name="newPassword"
              type="password"
              autocomplete="new-password"
              placeholder="Create a password"
            />
          </label>

          <label for="confirm-password">Confirm new password
            <input
              id="confirm-password"
              name="confirmPassword"
              type="password"
              autocomplete="new-password"
              placeholder="Repeat new password"
            />
          </label>

          <button id="create-account" type="submit">Create account</button>
        </form>

        <div id="fixture-result" class="note" hidden aria-live="polite"></div>

        <div class="note">
          Expected native interpretation: signup-like surface with visible username and new/confirm password fields.
        </div>
      </section>
    </main>
    <script>
      const signupForm = document.getElementById('create-account-form');
      const signupResult = document.getElementById('fixture-result');
      signupForm?.addEventListener('submit', (event) => {
        event.preventDefault();
        const email = document.getElementById('email')?.value?.trim() || '(empty)';
        const newPasswordLength = document.getElementById('new-password')?.value?.length || 0;
        const confirmPasswordLength = document.getElementById('confirm-password')?.value?.length || 0;
        signupResult.hidden = false;
        signupResult.textContent = `Signup fixture intercepted submit locally for ${email}. Password lengths: ${newPasswordLength}/${confirmPasswordLength}.`;
      });
    </script>
  </body>
</html>
