name: Cron / Fix localizable strings
on:
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  fix-localizable-strings:
    name: Fix localizable strings
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Run fix-localizable-strings
        run: bash Scripts/fix-localizable-strings.sh | tee /tmp/fix-output.txt

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "✅ No changes detected, skipping..."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "👀 Changes detected"

      - name: Create branch and commit
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="cron/fix-localizable-strings"
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git checkout -b "$BRANCH_NAME"
          git add -A
          git commit -m "chore: Fix Localizable.strings file"
          git push origin "$BRANCH_NAME" --force
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Create or update Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list \
            --head "$BRANCH_NAME" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          SCRIPT_OUTPUT=$(cat /tmp/fix-output.txt)
          PR_BODY="Automated cleanup of Localizable.strings files.

## Script output

\`\`\`
$SCRIPT_OUTPUT
\`\`\`"

          if [ -n "$EXISTING_PR" ]; then
            echo -e "$PR_BODY" | gh pr edit "$EXISTING_PR" \
              --title "chore: Fix Localizable.strings file" \
              --body-file -
            echo "Updated existing PR #$EXISTING_PR"
          else
            echo -e "$PR_BODY" | gh pr create \
              --title "chore: Fix Localizable.strings file" \
              --body-file - \
              --base main \
              --head "$BRANCH_NAME" \
              --label "automated-pr" \
              --label "t:ci"
          fi
